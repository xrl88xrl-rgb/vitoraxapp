name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Install Flet
      run: |
        pip install flet
        pip install flet-cli
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Build APK
      run: |
        flet build apk morbimortalidad.py \
          --name "Morbimortalidad" \
          --package-name "com.morbimortalidad.app"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Morbimortalidad-APK
        path: build/apk/*.apk
